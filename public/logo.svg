<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradiente de fondo oscuro -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    
    <!-- Gradiente del logo principal -->
    <linearGradient id="logoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="50%" stop-color="#14b8a6"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    
    <!-- Sombra del logo -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.3"/>
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Fondo redondeado suave -->
  <rect width="512" height="512" rx="128" fill="url(#bgGrad)" />

  <!-- Símbolo de Finanzas (Moderno e Interconectado) -->
  <g transform="translate(116, 116)" filter="url(#glow)">
    <!-- Barra 1 (Izquierda - Gasto/Base) -->
    <rect x="40" y="140" width="40" height="100" rx="20" fill="url(#logoGrad)" opacity="0.6"/>
    
    <!-- Barra 2 (Medio - Crecimiento) -->
    <rect x="120" y="80" width="40" height="160" rx="20" fill="url(#logoGrad)" opacity="0.85"/>
    
    <!-- Barra 3 (Derecha - Máximo) -->
    <rect x="200" y="40" width="40" height="200" rx="20" fill="url(#logoGrad)"/>
    
    <!-- Arco de Crecimiento conectado (Línea dinámica de tendencia) -->
    <path d="M 60,190 Q 140,120 220,90" fill="none" stroke="#ffffff" stroke-width="24" stroke-linecap="round" />
    <path d="M 60,190 Q 140,120 220,90" fill="none" stroke="url(#logoGrad)" stroke-width="16" stroke-linecap="round" />
  </g>
</svg>
